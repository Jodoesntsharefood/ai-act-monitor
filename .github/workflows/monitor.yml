name: Monitor EU AI Act Standards

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    # Allow manual trigger for testing
    inputs:
      force_notify:
        description: "Force send notification even if no changes (for testing)"
        required: false
        default: "false"

permissions:
  contents: write  # needed to commit snapshot updates

jobs:
  check-standards:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout repo (including stored snapshots) ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      # ── 4. Run the monitor script ───────────────────────────────────────────
      - name: Check standards page for changes
        id: check
        run: python scripts/check_standards.py

      # ── 5. Read result ──────────────────────────────────────────────────────
      - name: Read check result
        id: result
        run: |
          HAS_CHANGES=$(python -c "import json; d=json.load(open('check_result.json')); print(d['has_changes'])")
          SUBJECT=$(python -c "import json; d=json.load(open('check_result.json')); print(d.get('email_subject',''))")
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT

      # ── 6. Commit updated snapshot back to repo ─────────────────────────────
      - name: Commit snapshot update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --cached --quiet || git commit -m "chore: update standards snapshot [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Send email via Resend API ─────────────────────────────────────────
      - name: Send notification email
        if: steps.result.outputs.has_changes == 'True' || github.event.inputs.force_notify == 'true'
        run: |
          python - <<'EOF'
          import json, os, urllib.request, urllib.error

          with open("check_result.json") as f:
              result = json.load(f)

          subject = result.get("email_subject", "AI Act 标准变化通知")
          body_text = result.get("email_body", "")

          payload = json.dumps({
              "from": "AI Act Monitor <onboarding@resend.dev>",
              "to": [os.environ["NOTIFY_EMAIL"]],
              "subject": subject,
              "text": body_text,
          }).encode()

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=payload,
              headers={
                  "Authorization": f"Bearer {os.environ['RESEND_API_KEY']}",
                  "Content-Type": "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print("Email sent:", resp.read().decode())
          except urllib.error.HTTPError as e:
              print("Failed:", e.code, e.read().decode())
              raise
          EOF
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      # ── 8. Upload check result as artifact for debugging ────────────────────
      - name: Upload check result as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-result-${{ github.run_number }}
          path: check_result.json
          retention-days: 30
